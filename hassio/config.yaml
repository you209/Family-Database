name: FamilyRoot
description: Local-first family history database with photos, family tree, timeline and map. Browse your family records from any device on your network.
version: "0.1.0"
slug: familyroot
url: https://github.com/you209/Family-Database
arch:
  - amd64
  - aarch64
  - armv7
ingress: true
ingress_port: 5050
ingress_stream: true
panel_icon: mdi:family-tree
panel_title: FamilyRoot
ports:
  5050/tcp: 5050
ports_description:
  5050/tcp: FamilyRoot web interface
map:
  - share:rw
options:
  data_folder: /share/familyroot
  debug: false
schema:
  data_folder: str
  debug: bool
startup: application
boot: auto
init: false
