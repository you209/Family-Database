<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>FamilyRoot</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        /* Dark palette from the mockup */
        --bg-app:      #111111;
        --bg-sidebar:  #1A1A1A;
        --bg-card:     #222222;
        --bg-card-hov: #2A2A2A;
        --bg-input:    #2A2A2A;
        --bg-tag:      #2E2E2E;
        --bg-sel:      #2C2C2C;

        --border:      #2E2E2E;
        --border-card: #333333;

        --text-primary:   #F0F0F0;
        --text-secondary: #888888;
        --text-tertiary:  #555555;

        --accent:      #1D9E75;
        --accent-dark: #157A5A;

        /* Avatar palette — cycled by name hash */
        --av-blue:    #B8D4F0;
        --av-salmon:  #F0C4B8;
        --av-teal:    #B8EAD8;
        --av-lavender:#D4C8F0;
        --av-peach:   #F0DCC8;
        --av-rose:    #F0C8D8;

        --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        --mono: "SF Mono", "Fira Code", Consolas, monospace;
        --sidebar-w: 260px;
      }

      html, body, #root {
        height: 100%;
        font-family: var(--font);
        background: var(--bg-app);
        color: var(--text-primary);
        font-size: 14px;
        -webkit-font-smoothing: antialiased;
      }

      input, button, select, textarea {
        font-family: inherit;
        font-size: inherit;
        color: inherit;
      }

      input[type="text"],
      input[type="search"],
      input[type="number"],
      select, textarea {
        background: var(--bg-input);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 8px 12px;
        color: var(--text-primary);
        outline: none;
        transition: border-color 0.15s;
      }
      input::placeholder { color: var(--text-tertiary); }
      input:focus, select:focus, textarea:focus {
        border-color: var(--accent);
      }

      button {
        background: var(--bg-tag);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 8px 16px;
        color: var(--text-primary);
        cursor: pointer;
        transition: background 0.12s, border-color 0.12s;
      }
      button:hover:not(:disabled) { background: var(--bg-card-hov); }
      button:disabled { opacity: 0.4; cursor: not-allowed; }

      button.primary {
        background: var(--accent);
        border-color: var(--accent);
        color: #fff;
      }
      button.primary:hover:not(:disabled) { background: var(--accent-dark); }

      a { color: var(--accent); text-decoration: none; }
      a:hover { text-decoration: underline; }

      ::-webkit-scrollbar { width: 5px; height: 5px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }

      @keyframes spin { to { transform: rotate(360deg); } }

      /* Mobile: prevent horizontal scroll */
      html, body { overflow-x: hidden; }

      /* Mobile: prevent iOS input zoom (font-size must be >= 16px) */
      @media (max-width: 767px) {
        input, select, textarea { font-size: 16px !important; }
      }

      @media print {
        /* Hide nav/sidebar/buttons */
        aside, nav, button, .no-print { display: none !important; }

        /* Full width main content */
        main, body, html { width: 100% !important; overflow: visible !important; }

        /* Cards print cleanly */
        [style*="background: var(--bg-card)"],
        [style*="background:var(--bg-card)"] {
          background: #fff !important;
          border: 1px solid #ccc !important;
          color: #000 !important;
        }

        /* Dark backgrounds → white */
        body { background: #fff !important; color: #000 !important; }

        /* Page breaks */
        .page-break { page-break-before: always; }

        /* Hide map tiles (Leaflet), canvas elements */
        .leaflet-container, canvas { display: none !important; }

        /* Person cards in grid */
        @page { margin: 1cm; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
