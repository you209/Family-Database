<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FamilyRoot</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --color-background-primary:   #FAFAF8;
        --color-background-secondary: #F3F1EA;
        --color-background-tertiary:  #ECEAE1;
        --color-border-primary:       #D6D3CA;
        --color-border-secondary:     #C8C5BB;
        --color-border-tertiary:      #DDD9D0;
        --color-text-primary:         #1A1916;
        --color-text-secondary:       #6B6960;
        --color-text-tertiary:        #9E9B91;
        --color-accent:               #1D9E75;
        --color-accent-light:         #E1F5EE;
        --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        --font-mono: "SF Mono", "Fira Code", Consolas, monospace;
      }

      body {
        font-family: var(--font-sans);
        background: var(--color-background-primary);
        color: var(--color-text-primary);
        font-size: 14px;
        line-height: 1.5;
        -webkit-font-smoothing: antialiased;
      }

      input, button, select, textarea {
        font-family: inherit;
        font-size: inherit;
        color: inherit;
      }

      input[type="text"], input[type="number"], input[type="search"], select, textarea {
        background: var(--color-background-primary);
        border: 0.5px solid var(--color-border-secondary);
        border-radius: 6px;
        padding: 6px 10px;
        outline: none;
        transition: border-color 0.15s;
      }
      input[type="text"]:focus, input[type="search"]:focus, select:focus, textarea:focus {
        border-color: var(--color-accent);
      }

      button {
        background: var(--color-background-secondary);
        border: 0.5px solid var(--color-border-secondary);
        border-radius: 6px;
        padding: 6px 14px;
        cursor: pointer;
        transition: background 0.12s;
      }
      button:hover:not(:disabled) { background: var(--color-background-tertiary); }
      button:disabled { opacity: 0.4; cursor: not-allowed; }

      button.primary {
        background: var(--color-accent);
        color: #fff;
        border-color: transparent;
      }
      button.primary:hover:not(:disabled) { background: #178860; }

      a { color: var(--color-accent); text-decoration: none; }
      a:hover { text-decoration: underline; }

      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: var(--color-border-primary); border-radius: 3px; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
